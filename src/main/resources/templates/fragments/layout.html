<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">S.I.L - Info</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap" rel="stylesheet">
</head>
<body>

    <header th:fragment="header" id="main-header">
        <div class="header-content">
            <div class="logo">S.I.L - Info</div>
            <nav id="main-nav">
                <a th:href="@{/signs}">Início</a>
                <a th:href="@{/favorites}">Favoritos</a>
                <a th:href="@{/home/about}">Sobre</a>
                <a th:href="@{/admin/signs}" th:if="${currentUser != null and currentUser.role == 'ADMIN'}">Gerenciar Sinais</a>
                <a th:href="@{/admin/users}" th:if="${currentUser != null and currentUser.role == 'ADMIN'}">Gerenciar Usuários</a>
                <a th:href="@{/auth/logout}" th:if="${currentUser != null}">Sair</a>
                <a th:href="@{/auth/login}" th:if="${currentUser == null}">Entrar</a>
            </nav>
        </div>
    </header>

    <footer th:fragment="footer">
        <p>&copy; 2025 S.I.L - Info - Sistema para Intérpretes de Libras na Área da Informática</p>
    </footer>

</body>
</html>
