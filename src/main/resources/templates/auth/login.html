<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('S.I.L - Login')}"></head>
<body>
    <div class="auth-container">
        <div class="container animate-fade">
            <header style="text-align: center; margin-bottom: 2rem;">
                <h1 style="font-family: 'Outfit', sans-serif; font-size: 2.5rem; color: var(--cor-primary-dark);">Entrar no Sistema</h1>
                <p style="color: var(--cor-text-secondary);">Acesse seu dicionário técnico de Libras.</p>
            </header>

            <form th:action="@{/login}" method="post">
                <div th:if="${param.error}" style="background: #fee2e2; color: #ef4444; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-weight: 600; text-align: center;">
                    E-mail ou senha incorretos.
                </div>

                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" name="username" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" name="password" required placeholder="Digite sua senha">
                </div>
                
                <button type="submit" class="btn" style="width: 100%;">Entrar</button>
                
                <p style="margin-top: 2rem; text-align: center; color: var(--cor-text-secondary);">
                    Não tem conta? <a th:href="@{/users/new}" style="color: var(--cor-primary); font-weight: bold; text-decoration: none;">Cadastre-se</a>
                </p>
                
                <div style="margin-top: 2rem; padding: 1rem; background: var(--cor-primary-light); border-radius: 8px; font-size: 0.85rem; color: var(--cor-primary-dark);">
                    💡 <strong>Dica:</strong> Use as credenciais cadastradas no sistema para acesso completo.
                </div>
            </form>
        </div>
    </div>
</body>
</html>
