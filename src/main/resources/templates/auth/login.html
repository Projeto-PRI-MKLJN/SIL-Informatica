<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('S.I.L - Login')}"></head>
<body class="auth-page">
    <header th:replace="~{fragments/layout :: header}"></header>

    <main>
        <div class="auth-container">
            <div class="container">
                <h1 style="color: var(--cor-primary-dark); text-align: center; margin-bottom: 2rem;">Entrar no Sistema</h1>
                
                <form th:action="@{/auth/login}" method="post">
                    <div th:if="${param.error}" style="color: var(--cor-error); margin-bottom: 1rem; font-weight: bold; text-align: center;">
                        E-mail ou senha incorretos.
                    </div>

                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" name="username" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" name="password" required placeholder="Digite sua senha">
                    </div>
                    
                    <button type="submit" class="btn">Entrar</button>
                    
                    <p style="margin-top: 1.5rem; text-align: center;">
                        Não tem conta? <a th:href="@{/auth/register}" style="color: var(--cor-primary); font-weight: bold;">Cadastre-se</a>
                    </p>
                </form>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
