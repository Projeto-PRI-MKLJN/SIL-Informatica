<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('S.I.L - Cadastro')}"></head>
<body class="auth-page">
    <header th:replace="~{fragments/layout :: header}"></header>

    <main>
        <div class="auth-container">
            <div class="container">
                <h1>Criar Conta</h1>
                <form th:action="@{/auth/register}" th:object="${user}" method="post">
                    <div th:if="${errorMessage}" style="background: #fee2e2; color: #b91c1c; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.9rem;">
                        <p th:text="${errorMessage}"></p>
                    </div>
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" th:field="*{name}" required placeholder="Seu nome completo">
                        <div style="color: var(--cor-error); font-size: 0.8rem;" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" th:field="*{email}" required placeholder="seu@email.com">
                        <div style="color: var(--cor-error); font-size: 0.8rem;" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" th:field="*{password}" required minlength="6" placeholder="Mínimo 6 caracteres">
                        <div style="color: var(--cor-error); font-size: 0.8rem;" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>

                    <div class="form-group">
                        <label>Confirmar Senha</label>
                        <input type="password" id="cadastro-confirma" name="confirmPassword" required minlength="6" placeholder="Digite a senha novamente">
                    </div>

                    <button type="submit" class="btn">Cadastrar</button>
                    
                    <p style="margin-top: 1rem; text-align: center;">
                        Já tem conta? <a th:href="@{/auth/login}" style="color: var(--cor-primary); font-weight: bold;">Entrar</a>
                    </p>
                </form>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
