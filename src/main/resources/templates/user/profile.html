<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('S.I.L - Perfil')}"></head>
<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="container" style="margin-top: 4rem; max-width: 600px;">
        <div class="animate-fade" style="background: white; padding: 4rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center;">
            <div style="width: 100px; height: 100px; background: var(--cor-primary-light); color: var(--cor-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto 2rem;">
                👤
            </div>
            
            <h1 th:text="${currentUser.name}" style="font-family: 'Outfit', sans-serif;">Nome do Usuário</h1>
            <p th:text="${currentUser.email}" style="color: var(--cor-text-secondary); margin-bottom: 3rem;">email@exemplo.com</p>
            
            <hr style="border: none; border-top: 1px solid var(--cor-border); margin-bottom: 2rem;">
            
            <div style="text-align: left; margin-bottom: 3rem;">
                <p><strong>Nível de Acesso:</strong> <span class="categoria-tag" th:text="${currentUser.role}">USER</span></p>
                <p style="margin-top: 1rem;"><strong>Desde:</strong> <span th:text="${#temporals.format(currentUser.createdAt, 'dd/MM/yyyy')}">01/01/2026</span></p>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <a th:href="@{/user/edit}" class="btn">Editar Perfil</a>
                <a th:href="@{/logout}" class="btn btn-secondary">Sair da Conta</a>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
