<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('S.I.L - Dashboard')}"></head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="container">
        <div class="dashboard-intro animate-fade">
            <h1 style="font-family: 'Outfit', sans-serif; font-size: 2.5rem; color: var(--cor-primary-dark);">
                Olá, <span sec:authentication="principal.user.name">Usuário</span>!
            </h1>
            <p style="color: var(--cor-text-secondary);">Bem-vindo ao seu painel de estudos em Libras.</p>
        </div>

            <div class="sinais-grid grid-centered">
                <a th:href="@{/favorites}" class="sinal-card-link">
                    <div class="sinal-card" style="text-align: center; padding: 3rem;">
                        <h3 style="font-size: 3rem; color: var(--cor-primary);" th:text="${favoritesCount}">0</h3>
                        <p>Sinais Favoritos</p>
                        <span class="btn btn-small" style="margin-top: 1rem; display: inline-block;">Ver Todos</span>
                    </div>
                </a>

                <a th:href="@{/signs}" class="sinal-card-link">
                    <div class="sinal-card" style="text-align: center; padding: 3rem;">
                        <h3 style="font-size: 3.5rem;">🤟</h3>
                        <p>Dicionário Técnico</p>
                        <span class="btn btn-small btn-secondary"
                            style="margin-top: 1rem; display: inline-block;">Explorar</span>
                    </div>
                </a>

                <a th:href="@{/signs/glossary}" class="sinal-card-link">
                    <div class="sinal-card" style="text-align: center; padding: 3rem;">
                        <h3 style="font-size: 3rem; color: var(--cor-secondary);">A-Z</h3>
                        <p>Índice Alfabético</p>
                        <span class="btn btn-small" style="margin-top: 1rem; display: inline-block;">Acessar</span>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>

</html>
