<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('S.I.L - Dashboard')}"></head>
<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="container" style="margin-top: 4rem;">
        <div class="animate-fade">
            <h1 style="font-family: 'Outfit', sans-serif; font-size: 2.5rem; color: var(--cor-primary-dark);">
                Olá, <span th:text="${user.name}">Usuário</span>!
            </h1>
            <p style="color: var(--cor-text-secondary); margin-bottom: 3rem;">Bem-vindo ao seu painel de estudos em Libras.</p>
            
            <div class="sinais-grid">
                <div class="sinal-card" style="text-align: center; padding: 3rem;">
                    <h3 style="font-size: 3rem; color: var(--cor-primary);" th:text="${favoritesCount}">0</h3>
                    <p>Sinais Favoritos</p>
                    <a th:href="@{/favorites}" class="btn btn-small" style="margin-top: 1rem; display: inline-block;">Ver Todos</a>
                </div>
                
                <div class="sinal-card" style="text-align: center; padding: 3rem;">
                    <h3 style="font-size: 3.5rem;">🤟</h3>
                    <p>Dicionário Técnico</p>
                    <a th:href="@{/signs}" class="btn btn-small btn-secondary" style="margin-top: 1rem; display: inline-block;">Explorar</a>
                </div>

                <div class="sinal-card" style="text-align: center; padding: 3rem;">
                    <h3 style="font-size: 3rem; color: var(--cor-secondary);">A-Z</h3>
                    <p>Índice Alfabético</p>
                    <a th:href="@{/signs/glossary}" class="btn btn-small" style="margin-top: 1rem; display: inline-block;">Acessar</a>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
