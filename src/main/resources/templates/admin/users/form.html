<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('S.I.L - Editar Usuário')}"></head>
<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="container" style="margin-top: 4rem; max-width: 800px;">
        <div class="animate-fade" style="background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <h1 th:text="${user.id == null ? 'Novo Usuário' : 'Editar Usuário'}" style="font-family: 'Outfit', sans-serif; color: var(--cor-primary-dark);">Editar Usuário</h1>
            
            <form th:action="${user.id == null ? '/admin/users' : '/admin/users/' + user.id}" th:object="${user}" method="post" style="margin-top: 2rem;">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" th:field="*{name}" required placeholder="Ex: João Silva">
                    <div style="color: var(--cor-error); font-size: 0.8rem;" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" th:field="*{email}" required placeholder="exemplo@sil.com">
                    <div style="color: var(--cor-error); font-size: 0.8rem;" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="form-group">
                    <label>Cargo/Função (Role)</label>
                    <select th:field="*{role}" required>
                        <option value="USER">Usuário Comum</option>
                        <option value="ADMIN">Administrador</option>
                    </select>
                </div>

                <div style="display: flex; gap: 1.5rem; margin-top: 3rem; border-top: 1px solid var(--cor-border); padding-top: 2rem;">
                    <button type="submit" class="btn" style="flex: 1;">Salvar Alterações</button>
                    <a th:href="@{/admin/users}" class="btn btn-secondary" style="flex: 1; text-align: center; text-decoration: none;">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
