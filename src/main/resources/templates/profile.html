<nav th:replace="~{fragments/geral :: cabecalho}"></nav>
<main class="container">
    <div class="profile-card">
        <header class="auth-header">
            <div class="avatar-placeholder">👤</div>
            <h1 th:text="${usuario.nome}">Seu Nome</h1>
            <p th:text="${usuario.email}">email@ifsp.edu.br</p>
        </header>

        <hr>

        <div class="profile-details">
            <p><strong>Membro desde:</strong> <span th:text="${#temporals.format(usuario.dataCriacao, 'dd/MM/yyyy')}">01/01/2026</span></p>
            <p><strong>Nível de Acesso:</strong> Usuário Comum</p>
        </div>

        <div class="profile-actions">
            <a th:href="@{/perfil/editar}" class="btn btn-block">Editar Dados</a>
            <button type="button" class="btn-outline-danger">Excluir Minha Conta</button>
        </div>
    </div>
</main>
