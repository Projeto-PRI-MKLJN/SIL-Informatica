<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>S.I.L - Criar Conta</title>
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
    <main class="auth-container">
        <div class="container">
            <header class="auth-header">
                <h1 id="titulo-cadastro">Criar Nova Conta</h1>
                <p class="auth-subtitle">Junte-se ao S.I.L e acesse o dicionário de Libras para TI.</p>
            </header>

            <form th:action="@{/usuarios/salvar}" method="POST" class="form-auth">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" required placeholder="Ex: João Silva">
                </div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required minlength="6">
                    <small class="form-hint">A senha deve ter no mínimo 6 caracteres.</small>
                </div>
                <button type="submit" class="btn btn-block">Finalizar Cadastro</button>
            </form>
            <p class="auth-footer">Já tem conta? <a th:href="@{/login}">Faça login</a></p>
        </div>
    </main>
</body>
</html>
